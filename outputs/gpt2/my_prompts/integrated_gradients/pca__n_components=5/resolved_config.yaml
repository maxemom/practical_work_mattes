paths:
  data_dir: data
  output_dir: outputs
seeds:
  seed: 42
runtime:
  device: auto
aggregation:
  baseline: L2Norm
  normalize: true
generation:
  max_new_tokens: 10
  do_sample: false
  temperature: 1.0
  top_p: 1.0
model:
  name: gpt2
  params:
    max_new_tokens: 16
    do_sample: false
    temperature: 1.0
    top_p: 1.0
dataset:
  name: my_prompts
  path: data/prompts.txt
attribution:
  name: integrated_gradients
  params:
    n_steps: 20
dimred:
  name: pca
  params:
    n_components: 5
