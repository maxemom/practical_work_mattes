paths:
  raw:
    wikitext2_train: data/raw/wikitext-2/train.txt
    tellmewhy_csv: data/raw/tellmewhy/train.csv
  processed:
    wikitext2_100: data/processed/wikitext2_100_seed42.txt
    tellmewhy_100: data/processed/tellmewhy_100_seed42.txt
  output_dir: outputs/docker_smoke
seeds:
  seed: 42
runtime:
  device: cpu
  dtype: float32
generation:
  max_new_tokens: 10
  do_sample: false
  temperature: 1.0
  top_p: 1.0
metrics:
  mode: log_ratio
  eps: 1.0e-12
  random_baseline: softmax_uniform
  normalize_columns: true
  debug_steps: false
dataset_preparation:
  seed: 42
  n_samples: 5
  wikitext:
    min_chars: 40
    max_sentence_chars: 280
    drop_section_titles: true
  tellmewhy:
    narrative_col: narrative
    question_col: question
    min_chars: 40
    max_chars: 800
environment:
  required_modules:
  - torch
  - transformers
  - inseq
  - sklearn
  - scipy
  - matplotlib
  - pandas
  - yaml
docker:
  expected_files:
  - docker/Dockerfile
  - docker/docker-compose.yml
model:
  name: Qwen/Qwen2.5-0.5B-Instruct
  params:
    max_new_tokens: 10
    do_sample: false
dataset:
  name: tellmewhy
  path: data/processed/tellmewhy_5_seed42.txt
attribution_functions:
- tag: saliency
  name: saliency
  params: {}
  index: 0
dimensionality_reduction_methods:
- tag: baseline
  name: baseline
  params:
    norm: l2
  index: 0
