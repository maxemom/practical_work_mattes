models:
  - name: Qwen/Qwen2.5-0.5B-Instruct
    params:
      max_new_tokens: 10
      do_sample: false

datasets:
  - name: visual
    path: data/processed/Sentences_for_attribution_plots.txt
  - name: tellmewhy
    path: data/processed/tellmewhy_100_seed42.txt
  - name: wikitext2
    path: data/processed/wikitext2_100_seed42.txt

attribution_functions:
  - name: saliency
    params: {}

  - name: input_x_gradient
    params: {}

  - name: deeplift
    params: {}

  - name: gradient_shap
    params:
      n_samples: 8
      stdevs: 0.01

  - name: value_zeroing
    params: {}

  - name: lxt
    params: {}


dimensionality_reduction_methods:
  - name: baseline
    params:
      norm: l2

  - name: pca
    params:
      n_components: 1

  - name: pca
    params:
      n_components: 3

  - name: pca
    params:
      n_components: 5

  - name: factor_analysis
    params:
      n_components: 1

  - name: factor_analysis
    params:
      n_components: 3

  - name: factor_analysis
    params:
      n_components: 5

  - name: ica
    params:
      n_components: 1

  - name: ica
    params:
      n_components: 3

  - name: ica
    params:
      n_components: 5

  - name: kernel_pca
    params:
      n_components: 1

  - name: kernel_pca
    params:
      n_components: 3

  - name: kernel_pca
    params:
      n_components: 5

  - name: nmf
    params:
      n_components: 1

  - name: nmf
    params:
      n_components: 3

  - name: nmf
    params:
      n_components: 5
