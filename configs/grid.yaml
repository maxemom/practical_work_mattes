models:
  - name: gpt2
    params:
      max_new_tokens: 16
      do_sample: false
      temperature: 1.0
      top_p: 1.0

datasets:
  - name: my_prompts
    path: data/prompts.txt

attribution_functions:
  - name: integrated_gradients
    params:
      n_steps: 20

dimensionality_reduction_methods:
  - name: pca
    params:
      n_components: 5